---
# Relay role defaults

# Target VPN server (Server B) IP address - REQUIRED
# Set server_b_public_ip in group_vars/all.yml (shared with cascade role)
server_b_public_ip: ""

# port_a_tcp: 443  -- set in group_vars/all.yml
# port_b_tcp: "{{ xray_port }}"  -- set in group_vars/all.yml

# WAN interface - leave empty for auto-detection
wan_if: ""

# Firewall management mode
# - "keep": Keep UFW enabled, add NAT rules to /etc/ufw/before.rules
# - "disable": Disable UFW, use iptables-persistent
manage_ufw: "keep"

# =============================================================================
# XRay uplink client (WG client traffic over VLESS+Reality via TPROXY)
# =============================================================================
# XRay binary / service configuration (must match xray_server role values)
xray_bin:        "/usr/local/bin/xray"
# xray_version: set in group_vars/all.yml (single source of truth)
xray_config_dir: "/etc/xray"
xray_keys_dir:   "/etc/xray/keys"

# xray_port: 8443  -- set in group_vars/all.yml

# Reality camouflage settings (must match xray_server role values)
xray_reality_server_names:
  - "www.googletagmanager.com"
xray_reality_fingerprint: "chrome"

# wg-clients tunnel UUID — set in group_vars/all.yml
# Used to authenticate Server A's XRay against Server B's XRay
xray_wg_uplink_uuid: ""

# xray_tproxy_port: 12345  -- set in group_vars/all.yml

# =============================================================================
# SOCKS5 proxy (opt-in — for routing bot/API traffic through relay)
# =============================================================================
# General-purpose authenticated SOCKS5 entry on Server A. Traffic exits through
# the existing VLESS+Reality tunnel to Server B. Access restricted by credentials
# and UFW source IP allowlist. Intended primarily for bot/API traffic from
# trusted devices (e.g. a router running a Telegram bot).
#
# Enable and configure in your inventory group_vars/all.yml.
relay_socks5_enabled: false
relay_socks5_listen: "0.0.0.0"    # bind address; narrow to WG/internal IP if possible
relay_socks5_port: 9080
relay_socks5_user: ""
relay_socks5_pass: ""
relay_socks5_allowed_sources: []   # IPs allowed in UFW, e.g. ["1.2.3.4"]
