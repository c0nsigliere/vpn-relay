---
# Configure root SSH admin access from exit node to entry node (cascade mode only).
# Skipped entirely in standalone mode (no entry node).

- name: Ensure root .ssh directory exists
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags: [install]
  when: groups.get('relay_servers', []) | length > 0

- name: Generate root SSH keypair on exit node (if absent)
  community.crypto.openssh_keypair:
    path: /root/.ssh/id_ed25519
    type: ed25519
    comment: "root@exit-node"
    mode: "0600"
  register: _exitnode_keypair
  tags: [install]
  when: groups.get('relay_servers', []) | length > 0

- name: Create root SSH config with entry-node alias
  ansible.builtin.blockinfile:
    path: /root/.ssh/config
    create: yes
    owner: root
    group: root
    mode: "0600"
    marker: "# {mark} ANSIBLE MANAGED - entry-node alias"
    block: |
      Host server-a
          HostName {{ hostvars[groups['relay_servers'][0]]['ansible_host'] }}
          User root
          Port 22
          StrictHostKeyChecking yes
  tags: [install]
  when: groups.get('relay_servers', []) | length > 0

- name: Add entry-node host key to root known_hosts
  ansible.builtin.known_hosts:
    path: /root/.ssh/known_hosts
    name: "{{ hostvars[groups['relay_servers'][0]]['ansible_host'] }}"
    key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 ' + hostvars[groups['relay_servers'][0]]['ansible_host'] + ' 2>/dev/null') }}"
    state: present
  tags: [install]
  when: groups.get('relay_servers', []) | length > 0

- name: Authorize exit-node root key on entry node
  ansible.posix.authorized_key:
    user: root
    key: "{{ _exitnode_keypair.public_key }}"
    state: present
    comment: "root@exit-node (admin access)"
  delegate_to: "{{ groups['relay_servers'][0] }}"
  tags: [install]
  when: groups.get('relay_servers', []) | length > 0
