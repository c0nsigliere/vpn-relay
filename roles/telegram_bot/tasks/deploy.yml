---
- name: Create bot app directory
  file:
    path: "{{ bot_app_dir }}"
    state: directory
    owner: "{{ bot_user }}"
    group: "{{ bot_group }}"
    mode: "0755"
  tags: [deploy, bot]

- name: Sync bot source code
  shell: >
    rsync -az --delete
    --rsync-path="sudo rsync"
    --exclude=node_modules
    --exclude=dist
    --exclude='*.tsbuildinfo'
    --exclude=.env
    --exclude='*.db'
    {{ playbook_dir }}/../bot/
    {{ ansible_user | default('root') }}@{{ ansible_host }}:{{ bot_app_dir }}/
  delegate_to: localhost
  become: false
  changed_when: true
  notify: restart vpn-bot
  tags: [deploy, bot]

- name: Set bot app directory ownership
  file:
    path: "{{ bot_app_dir }}"
    state: directory
    owner: "{{ bot_user }}"
    group: "{{ bot_group }}"
    recurse: true
  tags: [deploy, bot]

- name: Install all dependencies (pnpm workspace)
  command: pnpm install --frozen-lockfile
  args:
    chdir: "{{ bot_app_dir }}"
  environment:
    CI: "true"
  become: true
  become_user: "{{ bot_user }}"
  tags: [deploy, bot]

- name: Build shared package first
  command: pnpm --filter @vpn-relay/shared build
  args:
    chdir: "{{ bot_app_dir }}"
  become: true
  become_user: "{{ bot_user }}"
  tags: [deploy, bot]

- name: Build server and web packages
  command: pnpm --filter server --filter web build
  args:
    chdir: "{{ bot_app_dir }}"
  become: true
  become_user: "{{ bot_user }}"
  notify: restart vpn-bot
  tags: [deploy, bot]

- name: Template .env configuration
  template:
    src: env.j2
    dest: "{{ bot_app_dir }}/.env"
    owner: "{{ bot_user }}"
    group: "{{ bot_group }}"
    mode: "0600"
  no_log: true
  notify: restart vpn-bot
  tags: [deploy, bot]

- name: Set ACL — vpn-bot execute on xray keys dir (traverse to read files)
  acl:
    path: "{{ xray_keys_dir }}"
    entity: "{{ bot_user }}"
    etype: user
    permissions: x
    state: present
  tags: [deploy, bot]

- name: Set ACL — vpn-bot reads XRay keys
  acl:
    path: "{{ item }}"
    entity: "{{ bot_user }}"
    etype: user
    permissions: r
    state: present
  loop:
    - "{{ xray_keys_dir }}/reality.pub"
    - "{{ xray_keys_dir }}/shortid"
  tags: [deploy, bot]

- name: Set ACL — vpn-bot write-execute on xray config dir (needed to create temp files)
  acl:
    path: "{{ xray_config_dir }}"
    entity: "{{ bot_user }}"
    etype: user
    permissions: wx
    state: present
  tags: [deploy, bot]

- name: Set ACL — vpn-bot reads/writes config.json
  acl:
    path: "{{ xray_config_dir }}/config.json"
    entity: "{{ bot_user }}"
    etype: user
    permissions: rw
    state: present
  tags: [deploy, bot]
