---
# Verify all active features: cascade (A+B) + relay (A) + xray (B) + memory/swap (all)
#
# Usage:
#   ansible-playbook playbooks/verify_all.yml

- name: Verify WireGuard cascade (Server A — wg-clients + XRay TPROXY)
  hosts: wg_cascade
  become: true
  tasks:
    - name: Run cascade verification
      ansible.builtin.import_role:
        name: wg_cascade
        tasks_from: verify
      tags: [verify, cascade]

- name: Verify XRay L4 relay (Server A)
  hosts: relay_servers
  become: true
  tasks:
    - name: Run relay verification
      ansible.builtin.import_role:
        name: relay
        tasks_from: verify
      tags: [verify, relay]

- name: Verify XRay VLESS+Reality (Server B)
  hosts: xray_servers
  become: true
  tasks:
    - name: Run XRay server verification
      ansible.builtin.import_role:
        name: xray_server
        tasks_from: verify
      tags: [verify, xray]

- name: Verify memory and swap (all hosts)
  hosts: all
  become: true
  gather_facts: true
  tags: [verify, memory]
  tasks:
    - name: Parse /proc/meminfo
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/wg_cascade/tasks/memory.yml"

    - name: Display memory summary
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }} memory:
          MemTotal={{ _mem_total_mb }} MB,
          MemAvailable={{ _mem_available_mb }} MB,
          SwapTotal={{ _swap_total_mb }} MB,
          SwapFree={{ _swap_free_mb }} MB

    - name: "WARN: MemAvailable is critically low (< 128 MB)"
      ansible.builtin.debug:
        msg: >-
          WARNING: {{ inventory_hostname }} has only {{ _mem_available_mb }} MB available RAM.
          Consider adding swap: ansible-playbook playbooks/maintenance_add_swap.yml
      when: _mem_available_mb | int < 128

    - name: "WARN: No swap configured (SwapTotal == 0)"
      ansible.builtin.debug:
        msg: >-
          WARNING: {{ inventory_hostname }} has no swap configured (SwapTotal = 0).
          Add swap with: ansible-playbook playbooks/maintenance_add_swap.yml
      when: _swap_total_mb | int == 0

    - name: Collect memory and swap usage (free -h)
      ansible.builtin.command:
        cmd: free -h
      register: _free_h
      changed_when: false

    - name: Display free -h output
      ansible.builtin.debug:
        msg: "{{ _free_h.stdout_lines }}"

    - name: Display CPU and load averages
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}:
          CPUs={{ ansible_processor_vcpus }},
          load avg={{ ansible_loadavg['1m'] | round(2) }} (1m) /
          {{ ansible_loadavg['5m'] | round(2) }} (5m) /
          {{ ansible_loadavg['15m'] | round(2) }} (15m)

- name: External Reachability (Controller → Servers)
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [verify, reachability]
  vars:
    _has_entry: "{{ groups.get('relay_servers', []) | length > 0 }}"
    _ip_a: "{{ hostvars[groups['relay_servers'][0]]['ansible_host'] if _has_entry | bool else '' }}"
    _ip_b: "{{ hostvars[groups['xray_servers'][0]]['ansible_host'] }}"
  tasks:
    - name: "[Controller→A] TCP connect to relay entry {{ _ip_a }}:{{ port_a_tcp }}"
      ansible.builtin.wait_for:
        host: "{{ _ip_a }}"
        port: "{{ port_a_tcp }}"
        timeout: 10
        state: started
      register: _reach_a_tcp
      changed_when: false
      failed_when: false
      when: _has_entry | bool

    - name: "[Controller→B] TCP connect to XRay {{ _ip_b }}:{{ xray_port }}"
      ansible.builtin.wait_for:
        host: "{{ _ip_b }}"
        port: "{{ xray_port }}"
        timeout: 10
        state: started
      register: _reach_b_tcp
      changed_when: false
      failed_when: false

    - name: Assert relay entry reachable from controller
      ansible.builtin.assert:
        that: not _reach_a_tcp.failed
        fail_msg: >-
          Relay entry {{ _ip_a }}:{{ port_a_tcp }} is NOT reachable from controller.
          Check firewall on entry node and that the relay service is running.
        success_msg: "Relay entry {{ _ip_a }}:{{ port_a_tcp }} is reachable"
      ignore_errors: true
      when: _has_entry | bool

    - name: Assert XRay reachable from controller
      ansible.builtin.assert:
        that: not _reach_b_tcp.failed
        fail_msg: >-
          XRay {{ _ip_b }}:{{ xray_port }} is NOT reachable from controller.
          Check firewall and that xray.service is running.
        success_msg: "XRay {{ _ip_b }}:{{ xray_port }} is reachable"
      ignore_errors: true

    - name: External reachability summary (cascade)
      ansible.builtin.debug:
        msg: |
          External Reachability Summary (from controller):
            Entry node relay  {{ _ip_a }}:{{ port_a_tcp }}/tcp  →  {{ "OK" if not _reach_a_tcp.failed else "FAIL" }}
            Exit node XRay    {{ _ip_b }}:{{ xray_port }}/tcp   →  {{ "OK" if not _reach_b_tcp.failed else "FAIL" }}
          Note: WireGuard UDP ports are not tested (UDP is stateless, requires a live WG client).
      when: _has_entry | bool

    - name: External reachability summary (standalone)
      ansible.builtin.debug:
        msg: |
          External Reachability Summary (from controller):
            XRay  {{ _ip_b }}:{{ xray_port }}/tcp  →  {{ "OK" if not _reach_b_tcp.failed else "FAIL" }}
      when: not (_has_entry | bool)
