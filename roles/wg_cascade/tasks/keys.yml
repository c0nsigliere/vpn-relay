---
# Key generation and cross-host public key exchange for wg_cascade
#
# Strategy:
# - Generate keypairs on each server using wg genkey (idempotent via stat check)
# - Exchange public keys via Ansible hostvars (both hosts must be in the same play)
# - Both server_a AND server_b must be present in the play for pubkey exchange to work.
#   Using --limit with a single group will fail fast here with a clear error.

# =============================================================================
# Guard: both hosts must be in the play (pubkey exchange requires hostvars from both)
# =============================================================================

- name: Assert both server_a and server_b are present in this play
  ansible.builtin.assert:
    that:
      - groups['server_a'] | intersect(ansible_play_hosts) | length > 0
      - groups['server_b'] | intersect(ansible_play_hosts) | length > 0
    fail_msg: >-
      Public key exchange requires both server_a and server_b to be in the same play.
      Cannot run keys.yml with --limit targeting only one group.
      Run the full cascade playbook: ansible-playbook playbooks/cascade.yml
  run_once: true

# =============================================================================
# SERVER A: Generate wg-clients keypair
# =============================================================================

- name: "[A] Check if wg-clients private key exists"
  ansible.builtin.stat:
    path: "{{ wg_keys_dir }}/wg-clients.key"
  register: _wg_clients_key_stat
  when: inventory_hostname in groups['server_a']

- name: "[A] Generate wg-clients private key"
  ansible.builtin.shell:
    cmd: "wg genkey > {{ wg_keys_dir }}/wg-clients.key"
  when:
    - inventory_hostname in groups['server_a']
    - not _wg_clients_key_stat.stat.exists

- name: "[A] Set permissions on wg-clients private key"
  ansible.builtin.file:
    path: "{{ wg_keys_dir }}/wg-clients.key"
    mode: '0600'
    owner: root
    group: root
  when: inventory_hostname in groups['server_a']

- name: "[A] Derive wg-clients public key"
  ansible.builtin.shell:
    cmd: "wg pubkey < {{ wg_keys_dir }}/wg-clients.key > {{ wg_keys_dir }}/wg-clients.pub"
  args:
    creates: "{{ wg_keys_dir }}/wg-clients.pub"
  when: inventory_hostname in groups['server_a']

- name: "[A] Set permissions on wg-clients public key"
  ansible.builtin.file:
    path: "{{ wg_keys_dir }}/wg-clients.pub"
    mode: '0644'
    owner: root
    group: root
  when: inventory_hostname in groups['server_a']

# =============================================================================
# SERVER A: Generate wg-uplink keypair
# =============================================================================

- name: "[A] Check if wg-uplink private key exists"
  ansible.builtin.stat:
    path: "{{ wg_keys_dir }}/wg-uplink.key"
  register: _wg_uplink_key_stat_a
  when: inventory_hostname in groups['server_a']

- name: "[A] Generate wg-uplink private key"
  ansible.builtin.shell:
    cmd: "wg genkey > {{ wg_keys_dir }}/wg-uplink.key"
  when:
    - inventory_hostname in groups['server_a']
    - not _wg_uplink_key_stat_a.stat.exists

- name: "[A] Set permissions on wg-uplink private key"
  ansible.builtin.file:
    path: "{{ wg_keys_dir }}/wg-uplink.key"
    mode: '0600'
    owner: root
    group: root
  when: inventory_hostname in groups['server_a']

- name: "[A] Derive wg-uplink public key"
  ansible.builtin.shell:
    cmd: "wg pubkey < {{ wg_keys_dir }}/wg-uplink.key > {{ wg_keys_dir }}/wg-uplink.pub"
  args:
    creates: "{{ wg_keys_dir }}/wg-uplink.pub"
  when: inventory_hostname in groups['server_a']

- name: "[A] Set permissions on wg-uplink public key"
  ansible.builtin.file:
    path: "{{ wg_keys_dir }}/wg-uplink.pub"
    mode: '0644'
    owner: root
    group: root
  when: inventory_hostname in groups['server_a']

# =============================================================================
# SERVER B: Generate wg-uplink keypair
# =============================================================================

- name: "[B] Check if wg-uplink private key exists"
  ansible.builtin.stat:
    path: "{{ wg_keys_dir }}/wg-uplink.key"
  register: _wg_uplink_key_stat_b
  when: inventory_hostname in groups['server_b']

- name: "[B] Generate wg-uplink private key"
  ansible.builtin.shell:
    cmd: "wg genkey > {{ wg_keys_dir }}/wg-uplink.key"
  when:
    - inventory_hostname in groups['server_b']
    - not _wg_uplink_key_stat_b.stat.exists

- name: "[B] Set permissions on wg-uplink private key"
  ansible.builtin.file:
    path: "{{ wg_keys_dir }}/wg-uplink.key"
    mode: '0600'
    owner: root
    group: root
  when: inventory_hostname in groups['server_b']

- name: "[B] Derive wg-uplink public key"
  ansible.builtin.shell:
    cmd: "wg pubkey < {{ wg_keys_dir }}/wg-uplink.key > {{ wg_keys_dir }}/wg-uplink.pub"
  args:
    creates: "{{ wg_keys_dir }}/wg-uplink.pub"
  when: inventory_hostname in groups['server_b']

- name: "[B] Set permissions on wg-uplink public key"
  ansible.builtin.file:
    path: "{{ wg_keys_dir }}/wg-uplink.pub"
    mode: '0644'
    owner: root
    group: root
  when: inventory_hostname in groups['server_b']

# =============================================================================
# Read public keys into hostvars for cross-host exchange
# Both slurp tasks run across all hosts before the copy tasks below.
# This is why both A and B must be in the same play (hosts: wg_cascade).
# =============================================================================

- name: "[A] Read wg-uplink public key into fact"
  ansible.builtin.slurp:
    src: "{{ wg_keys_dir }}/wg-uplink.pub"
  register: _a_uplink_pub
  when: inventory_hostname in groups['server_a']

- name: "[B] Read wg-uplink public key into fact"
  ansible.builtin.slurp:
    src: "{{ wg_keys_dir }}/wg-uplink.pub"
  register: _b_uplink_pub
  when: inventory_hostname in groups['server_b']

# =============================================================================
# Cross-host exchange: push A's pubkey to B, push B's pubkey to A
# =============================================================================

- name: "[B] Install Server A's uplink public key"
  ansible.builtin.copy:
    content: "{{ hostvars[groups['server_a'][0]]['_a_uplink_pub']['content'] | b64decode }}"
    dest: /etc/wireguard/peers/a-uplink.pub
    mode: '0644'
    owner: root
    group: root
  when:
    - inventory_hostname in groups['server_b']
    - hostvars[groups['server_a'][0]]['_a_uplink_pub'] is defined

- name: "[B] Warn if Server A's public key is not available (--limit used?)"
  ansible.builtin.debug:
    msg: >-
      WARNING: Server A's uplink public key is not available on this run.
      If you used --limit server_b, run again targeting both hosts to exchange keys.
      /etc/wireguard/peers/a-uplink.pub may be stale or missing.
  when:
    - inventory_hostname in groups['server_b']
    - hostvars[groups['server_a'][0]]['_a_uplink_pub'] is not defined

- name: "[A] Install Server B's uplink public key"
  ansible.builtin.copy:
    content: "{{ hostvars[groups['server_b'][0]]['_b_uplink_pub']['content'] | b64decode }}"
    dest: /etc/wireguard/peers/b-uplink.pub
    mode: '0644'
    owner: root
    group: root
  when:
    - inventory_hostname in groups['server_a']
    - hostvars[groups['server_b'][0]]['_b_uplink_pub'] is defined

- name: "[A] Warn if Server B's public key is not available (--limit used?)"
  ansible.builtin.debug:
    msg: >-
      WARNING: Server B's uplink public key is not available on this run.
      If you used --limit server_a, run again targeting both hosts to exchange keys.
      /etc/wireguard/peers/b-uplink.pub may be stale or missing.
  when:
    - inventory_hostname in groups['server_a']
    - hostvars[groups['server_b'][0]]['_b_uplink_pub'] is not defined
