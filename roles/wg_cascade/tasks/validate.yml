---
# Validation tasks for wg_cascade role

- name: Validate server_b_public_ip is provided
  ansible.builtin.assert:
    that:
      - server_b_public_ip is defined
      - server_b_public_ip | length > 0
    fail_msg: "server_b_public_ip must be set to Server B's WAN IP"
    success_msg: "server_b_public_ip is provided: {{ server_b_public_ip }}"

- name: Validate server_b_public_ip is a valid IPv4 address
  ansible.builtin.assert:
    that:
      - server_b_public_ip is regex('^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$')
    fail_msg: "server_b_public_ip '{{ server_b_public_ip }}' is not a valid IPv4 address"
    success_msg: "server_b_public_ip is a valid IPv4 address"

- name: Validate server_b_public_ip is not this host (prevent self-loop on Server A)
  ansible.builtin.assert:
    that:
      - server_b_public_ip != ansible_default_ipv4.address
    fail_msg: >-
      server_b_public_ip ({{ server_b_public_ip }}) cannot be the same as this host's IP
      ({{ ansible_default_ipv4.address }}). This would create a routing loop.
    success_msg: "server_b_public_ip is different from this host's IP"
  when: inventory_hostname in groups['server_a']

- name: Validate wg_clients_port is in valid range
  ansible.builtin.assert:
    that:
      - wg_clients_port | int >= 1
      - wg_clients_port | int <= 65535
    fail_msg: "wg_clients_port must be between 1 and 65535, got {{ wg_clients_port }}"
    success_msg: "wg_clients_port is valid: {{ wg_clients_port }}"

- name: Validate xray_tproxy_port is in valid range
  ansible.builtin.assert:
    that:
      - xray_tproxy_port | int >= 1
      - xray_tproxy_port | int <= 65535
    fail_msg: "xray_tproxy_port must be between 1 and 65535, got {{ xray_tproxy_port }}"
    success_msg: "xray_tproxy_port is valid: {{ xray_tproxy_port }}"

- name: Validate manage_ufw mode
  ansible.builtin.assert:
    that:
      - manage_ufw in ['keep', 'disable']
    fail_msg: "manage_ufw must be 'keep' or 'disable', got '{{ manage_ufw }}'"
    success_msg: "manage_ufw mode is valid: {{ manage_ufw }}"

- name: Auto-detect WAN interface if not specified
  when: wan_if | length == 0
  block:
    - name: Detect WAN interface via ip route
      ansible.builtin.set_fact:
        wan_if_detected: "{{ ansible_default_ipv4.interface | default('') }}"

    - name: Assert auto-detected WAN interface is non-empty
      ansible.builtin.assert:
        that:
          - wan_if_detected | length > 0
        fail_msg: >-
          Could not auto-detect WAN interface on {{ inventory_hostname }}.
          Set wan_if explicitly in group_vars.
        success_msg: "Auto-detected WAN interface: {{ wan_if_detected }}"

- name: Check if manually specified wan_if exists
  when: wan_if | length > 0
  block:
    - name: Verify specified wan_if interface exists on host
      ansible.builtin.command:
        cmd: "ip link show {{ wan_if }}"
      register: wan_if_check
      changed_when: false
      failed_when: false

    - name: Assert specified wan_if exists
      ansible.builtin.assert:
        that:
          - wan_if_check.rc == 0
        fail_msg: "Specified wan_if '{{ wan_if }}' does not exist on {{ inventory_hostname }}"
        success_msg: "Specified wan_if '{{ wan_if }}' exists"

- name: Set final WAN interface fact
  ansible.builtin.set_fact:
    wan_if_final: "{{ wan_if if wan_if | length > 0 else wan_if_detected }}"

- name: Display WAN interface being used
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }}: using WAN interface {{ wan_if_final }}"

# =============================================================================
# Resource pre-check (warn only — does not abort deployment)
# =============================================================================
- name: Warn if free RAM is critically low (< 128 MB)
  ansible.builtin.debug:
    msg: >-
      WARNING: {{ inventory_hostname }} has only {{ ansible_memfree_mb }} MB RAM free
      (total: {{ ansible_memtotal_mb }} MB, swap: {{ ansible_swaptotal_mb }} MB).
      apt install may hang or OOM-kill during package installation.
      Add swap before deploying:
        fallocate -l 512M /swapfile && chmod 600 /swapfile &&
        mkswap /swapfile && swapon /swapfile &&
        echo '/swapfile none swap sw 0 0' >> /etc/fstab
  when: ansible_memfree_mb | int < 128
