---
# Manage the unattended-upgrades package.
# Controlled by: manage_unattended_upgrades ("leave" | "true" | "false")
#
# "leave"  - Headless hygiene only (timers, Prompt=never). Package untouched.
# "true"   - Install package + enable + deploy security-only overlay.
# "false"  - Disable package. Overlay removed.
#
# Unconditional hygiene (Block A) always runs regardless of mode:
#   - desktop update-notifier timers masked (not needed on a server, can cause CPU spike)
#   - release upgrade Prompt=never (prevents interactive dist-upgrades)
# Tags: unattended, maintenance

# -- Block A: Unconditional headless hygiene --------------------------------------------------

- name: Mask update-notifier-download.timer (desktop artifact, not needed on server)
  ansible.builtin.systemd:
    name: update-notifier-download.timer
    state: stopped
    enabled: false
    masked: true
  failed_when: false   # timer may be absent on minimal images
  tags:
    - unattended
    - maintenance

- name: Mask update-notifier-motd.timer (desktop artifact)
  ansible.builtin.systemd:
    name: update-notifier-motd.timer
    state: stopped
    enabled: false
    masked: true
  failed_when: false
  tags:
    - unattended
    - maintenance

- name: Set release upgrade Prompt=never (headless server)
  ansible.builtin.lineinfile:
    path: /etc/update-manager/release-upgrades
    regexp: '^Prompt='
    line: 'Prompt=never'
    mode: '0644'
    create: false   # do not create if absent (minimal images)
  failed_when: false
  tags:
    - unattended
    - maintenance

# -- Block B: "true" mode ---------------------------------------------------------------------

- name: Install and enable unattended-upgrades
  when: manage_unattended_upgrades | string == "true"
  tags:
    - unattended
    - maintenance
  block:
    - name: Install unattended-upgrades package
      ansible.builtin.package:
        name: unattended-upgrades
        state: present

    - name: Enable automatic updates (20auto-upgrades)
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
        owner: root
        group: root
        mode: '0644'

    - name: Enable and start unattended-upgrades service
      ansible.builtin.systemd:
        name: unattended-upgrades
        enabled: true
        state: started

    - name: Deploy security-only overlay (99relay-unattended)
      ansible.builtin.template:
        src: 99relay-unattended.j2
        dest: /etc/apt/apt.conf.d/99relay-unattended
        owner: root
        group: root
        mode: '0644'

    # -- Resource limits for apt-daily-upgrade (systemd drop-in) --
    - name: Read memory info for apt resource limits
      ansible.builtin.include_tasks: "{{ role_path }}/../wg_cascade/tasks/memory.yml"

    - name: Ensure apt-daily-upgrade.service.d directory exists
      ansible.builtin.file:
        path: /etc/systemd/system/apt-daily-upgrade.service.d
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Deploy apt-daily-upgrade resource limit drop-in
      ansible.builtin.template:
        src: apt-daily-upgrade-override.conf.j2
        dest: /etc/systemd/system/apt-daily-upgrade.service.d/override.conf
        owner: root
        group: root
        mode: '0644'
      notify: Reload systemd daemon

    - name: Confirm unattended-upgrades enabled (security-only, no auto-reboot)
      ansible.builtin.debug:
        msg: >-
          unattended-upgrades ENABLED with security-only overlay deployed.
          Only -security origin packages will be auto-updated.
          Automatic-Reboot=false — server will NOT reboot automatically.
          apt-daily-upgrade resource limits: MemoryMax tiered by RAM ({{ _mem_total_mb }} MB).
          Pending reboots: ansible-playbook playbooks/maintenance.yml --tags reboot
      changed_when: false

# -- Block C: "false" mode --------------------------------------------------------------------

- name: Disable unattended-upgrades
  when: manage_unattended_upgrades | string == "false"
  tags:
    - unattended
    - maintenance
  block:
    - name: Stop and disable unattended-upgrades service
      ansible.builtin.systemd:
        name: unattended-upgrades
        state: stopped
        enabled: false
      failed_when: false

    - name: Disable automatic updates (20auto-upgrades)
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "0";
          APT::Periodic::Unattended-Upgrade "0";
        owner: root
        group: root
        mode: '0644'

    - name: Remove relay overlay if present
      ansible.builtin.file:
        path: /etc/apt/apt.conf.d/99relay-unattended
        state: absent

    - name: Remove apt-daily-upgrade resource limit drop-in
      ansible.builtin.file:
        path: /etc/systemd/system/apt-daily-upgrade.service.d
        state: absent
      notify: Reload systemd daemon

    - name: Confirm unattended-upgrades disabled
      ansible.builtin.debug:
        msg: >-
          unattended-upgrades has been DISABLED.
          Package updates will only occur when manually triggered via:
            ansible-playbook playbooks/update.yml
            ansible-playbook playbooks/maintenance.yml
          Ensure you schedule regular manual maintenance runs.
      changed_when: false

# -- "leave" mode: log only -------------------------------------------------------------------

- name: Log unattended-upgrades leave mode
  ansible.builtin.debug:
    msg: >-
      manage_unattended_upgrades='leave' - package configuration untouched.
      Headless hygiene (timers masked, Prompt=never) applied above.
  changed_when: false
  when: manage_unattended_upgrades | string == "leave"
  tags:
    - unattended
    - maintenance
