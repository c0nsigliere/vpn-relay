---
# Rollback / teardown WireGuard cascade VPN (Server A only)
#
# Usage:
#   ansible-playbook playbooks/rollback_wg_cascade.yml
#   ansible-playbook playbooks/rollback_wg_cascade.yml -e "wg_cascade_remove_keys=true"  # also delete keys
#
# This will:
#   - Stop and disable wg-quick@wg-clients
#   - Remove TPROXY fwmark ip rules and routes (table xray_tproxy_table) on Server A
#   - Remove UFW mangle TPROXY blockinfile entries (keep mode)
#   - Remove iptables TPROXY rules (disable mode)
#   - Remove WireGuard config file (wg-clients.conf)
#   - Remove sysctl config file (/etc/sysctl.d/99-wg-cascade.conf)
#   - Optionally remove keys if wg_cascade_remove_keys=true

- name: Rollback WireGuard cascade VPN
  hosts: wg_cascade
  become: true

  vars:
    manage_ufw: "keep"
    wg_cascade_remove_keys: false
    # wg_clients_port, xray_tproxy_port, xray_tproxy_table come from group_vars/all.yml
    wg_clients_net: "10.66.0.0/24"
    wg_keys_dir: "/etc/wireguard/keys"

  tasks:
    # =========================================================================
    # Stop WireGuard services
    # =========================================================================

    - name: Stop and disable wg-quick@wg-clients
      ansible.builtin.systemd:
        name: wg-quick@wg-clients
        state: stopped
        enabled: false
      failed_when: false

    # =========================================================================
    # Clean up TPROXY routing rules (Server A)
    # Note: PreDown hooks in wg-clients.conf handle this automatically
    # when the service is stopped. These tasks are belt-and-suspenders.
    # =========================================================================

    - name: "Remove ip rule for TPROXY fwmark → table {{ xray_tproxy_table }}"
      ansible.builtin.command:
        cmd: "ip rule del fwmark 0x1/0x1 table {{ xray_tproxy_table }} priority 100"
      failed_when: false
      changed_when: false

    - name: "Remove local route from table {{ xray_tproxy_table }}"
      ansible.builtin.command:
        cmd: "ip route del local 0.0.0.0/0 dev lo table {{ xray_tproxy_table }}"
      failed_when: false
      changed_when: false

    # =========================================================================
    # UFW keep mode rollback
    # =========================================================================

    - name: UFW keep mode rollback
      when: manage_ufw == "keep"
      block:
        - name: Remove WG-CASCADE MANGLE RULES from before.rules
          ansible.builtin.blockinfile:
            path: /etc/ufw/before.rules
            marker: "# {mark} WG-CASCADE MANGLE RULES"
            state: absent
          notify: reload ufw after rollback

        - name: Remove UFW allow rule for wg-clients port
          community.general.ufw:
            rule: allow
            port: "{{ wg_clients_port }}"
            proto: udp
            delete: true
          failed_when: false

    # =========================================================================
    # iptables disable mode rollback
    # =========================================================================

    - name: iptables disable mode rollback
      when: manage_ufw == "disable"
      block:
        - name: Remove TPROXY jump from PREROUTING -i wg-clients
          ansible.builtin.iptables:
            table: mangle
            chain: PREROUTING
            in_interface: wg-clients
            jump: XRAY_WG_TPROXY
            state: absent
          failed_when: false
          notify: save netfilter after rollback

        - name: Flush XRAY_WG_TPROXY chain
          ansible.builtin.iptables:
            table: mangle
            chain: XRAY_WG_TPROXY
            flush: true
          failed_when: false
          notify: save netfilter after rollback

        - name: Delete XRAY_WG_TPROXY chain
          ansible.builtin.iptables:
            table: mangle
            chain: XRAY_WG_TPROXY
            chain_management: true
            state: absent
          failed_when: false
          notify: save netfilter after rollback

    # =========================================================================
    # Remove WireGuard config files
    # =========================================================================

    - name: Remove WireGuard config files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/wireguard/wg-clients.conf

    # =========================================================================
    # Remove sysctl config
    # =========================================================================

    - name: Remove wg-cascade sysctl config file
      ansible.builtin.file:
        path: /etc/sysctl.d/99-wg-cascade.conf
        state: absent
      notify: reload sysctl after rollback

    # =========================================================================
    # Optionally remove key material (requires explicit opt-in)
    # =========================================================================

    - name: Remove WireGuard keys (only if wg_cascade_remove_keys=true)
      when: wg_cascade_remove_keys | bool
      block:
        - name: Remove Server A's key material
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - "{{ wg_keys_dir }}/wg-clients.key"
            - "{{ wg_keys_dir }}/wg-clients.pub"

    - name: Display rollback complete message
      ansible.builtin.debug:
        msg: |
          WireGuard cascade rollback complete on {{ inventory_hostname }}.
          - wg-quick@wg-clients stopped and disabled
          - TPROXY ip rules and routes removed
          - Firewall rules removed
          - Config file removed
          - Sysctl file removed
          Keys preserved (run with -e "wg_cascade_remove_keys=true" to remove keys).

  handlers:
    - name: reload ufw after rollback
      ansible.builtin.shell: >-
        iptables -t nat -F PREROUTING &&
        iptables -t nat -F POSTROUTING &&
        ufw reload

    - name: save netfilter after rollback
      ansible.builtin.command:
        cmd: netfilter-persistent save

    - name: reload sysctl after rollback
      ansible.builtin.command:
        cmd: sysctl --system
