---
# Full stack deployment — single entrypoint for the entire VPN relay infrastructure.
#
# Runs all subsystems in the correct order:
#   1. maintenance   — apt update/upgrade, health checks (A + B)
#   2. swap          — ensure swap exists on all hosts (A + B)
#   3. cascade       — WireGuard cascade VPN (A + B)
#   4. xray          — XRay VLESS+Reality server (B)
#   5. relay         — TCP L4 relay (A)
#   6. verify_all    — full verification across all subsystems + memory/swap
#   7. bot           — Telegram bot (if bot_telegram_token is set)
#   8. tma           — TMA nginx + HTTPS (if tma_domain is set)
#
# Usage:
#   ansible-playbook playbooks/stack.yml
#
#   # Skip maintenance (deploy only):
#   ansible-playbook playbooks/stack.yml --skip-tags maintenance,update,upgrade,reboot,health,unattended
#
#   # Verify only:
#   ansible-playbook playbooks/stack.yml --tags verify
#
# Each imported playbook can still be run standalone.

- name: "Stack [1/8]: Maintenance"
  ansible.builtin.import_playbook: maintenance.yml

- name: "Stack [2/8]: Swap provisioning (all hosts)"
  ansible.builtin.import_playbook: maintenance_add_swap.yml

- name: "Stack [3/8]: WireGuard cascade"
  ansible.builtin.import_playbook: wg_cascade.yml

- name: "Stack [4/8]: XRay VLESS+Reality"
  ansible.builtin.import_playbook: xray.yml

- name: "Stack [5/8]: TCP relay"
  ansible.builtin.import_playbook: relay.yml

- name: "Stack [6/8]: Full verification"
  ansible.builtin.import_playbook: verify_all.yml

- name: "Stack [7/8]: Telegram bot (optional — requires bot_telegram_token + bot_admin_id)"
  ansible.builtin.import_playbook: deploy_bot.yml
  when: bot_telegram_token | default('') | length > 0

- name: "Stack [8/8]: TMA nginx + HTTPS (optional — requires tma_domain)"
  ansible.builtin.import_playbook: deploy_tma.yml
  when: tma_domain | default('') | length > 0
