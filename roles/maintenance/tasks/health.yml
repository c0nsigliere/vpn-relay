---
# Post-maintenance health checks for the VPN relay.
# Asserts critical system state that an apt upgrade or reboot could break.
#
# Assert policy:
#   HARD FAIL (assert): ip_forward=0, UFW inactive (keep mode), missing rules.v4 (disable mode)
#     — only when the relay has been previously deployed (sysctl config file exists).
#     — skipped with a warning on fresh servers (first-time stack.yml run).
#   Display + WARNING: rp_filter, sysctl config file
#
# For service-level verification (iptables counters, listening ports, WG handshakes)
# run the dedicated playbooks: verify_all.yml, verify_wg_cascade.yml, verify_xray.yml
#
# Tags: health, maintenance

# =============================================================================
# DEPLOYMENT STATE PROBE
# Check whether the relay has been deployed before (sysctl persistence file).
# All CRITICAL assertions are gated on this — fresh servers skip them cleanly.
# =============================================================================

- name: Check sysctl config file exists
  ansible.builtin.stat:
    path: /etc/sysctl.d/99-vpn-relay.conf
  register: sysctl_conf_stat
  changed_when: false
  tags:
    - verify
    - health
    - maintenance

- name: Display sysctl config file status
  ansible.builtin.debug:
    msg: >-
      /etc/sysctl.d/99-vpn-relay.conf exists: {{ sysctl_conf_stat.stat.exists }}.
      {% if not sysctl_conf_stat.stat.exists %}
      WARNING: Config file missing - relay has not been deployed yet on this host.
      ip_forward / firewall assertions will be skipped (fresh server).
      Run the full stack to configure: ansible-playbook playbooks/stack.yml
      {% else %}
      OK: sysctl persistence file present — relay was previously deployed.
      {% endif %}
  changed_when: false
  tags:
    - verify
    - health
    - maintenance

# =============================================================================
# SYSCTL ASSERTIONS
# =============================================================================

- name: Check ip_forward value
  ansible.builtin.command:
    cmd: sysctl -n net.ipv4.ip_forward
  register: ip_forward_check
  changed_when: false
  tags:
    - verify
    - health
    - maintenance

- name: Assert ip_forward is enabled (relay is non-functional without this)
  ansible.builtin.assert:
    that:
      - ip_forward_check.stdout | trim == "1"
    fail_msg: >-
      CRITICAL: net.ipv4.ip_forward = '{{ ip_forward_check.stdout | trim }}'.
      IP forwarding MUST be enabled for relay forwarding to work.
      Fix: ansible-playbook playbooks/relay.yml --tags sysctl
    success_msg: "OK: net.ipv4.ip_forward = 1"
  when: sysctl_conf_stat.stat.exists
  tags:
    - verify
    - health
    - maintenance

- name: Check rp_filter (all interfaces)
  ansible.builtin.command:
    cmd: sysctl -n net.ipv4.conf.all.rp_filter
  register: rp_filter_all
  changed_when: false
  failed_when: false
  tags:
    - verify
    - health
    - maintenance

- name: Check rp_filter (default)
  ansible.builtin.command:
    cmd: sysctl -n net.ipv4.conf.default.rp_filter
  register: rp_filter_default
  changed_when: false
  failed_when: false
  tags:
    - verify
    - health
    - maintenance

- name: Display rp_filter settings
  ansible.builtin.debug:
    msg: |
      rp_filter (expected: 0 = disabled, required for TPROXY on wg_cascade hosts):
        net.ipv4.conf.all.rp_filter     = {{ rp_filter_all.stdout | trim | default('unknown') }}
        net.ipv4.conf.default.rp_filter = {{ rp_filter_default.stdout | trim | default('unknown') }}
      {% if (rp_filter_all.stdout | trim) == '0' and (rp_filter_default.stdout | trim) == '0' %}
      OK: rp_filter is correctly set to 0 (disabled) for TPROXY.
      {% else %}
      WARNING: rp_filter is not 0. TPROXY-redirected packets may be dropped on asymmetric paths.
      Fix: ansible-playbook playbooks/wg_cascade.yml --tags sysctl
      {% endif %}
  changed_when: false
  tags:
    - verify
    - health
    - maintenance

# =============================================================================
# FIREWALL STATE VERIFICATION (MODE-AWARE)
# =============================================================================

- name: Check UFW status (keep mode)
  ansible.builtin.command:
    cmd: ufw status verbose
  register: ufw_status_health
  changed_when: false
  failed_when: false
  when:
    - manage_ufw == "keep"
    - sysctl_conf_stat.stat.exists
  tags:
    - verify
    - health
    - maintenance

- name: Assert UFW is active (keep mode)
  ansible.builtin.assert:
    that:
      - "'Status: active' in ufw_status_health.stdout"
    fail_msg: >-
      CRITICAL: UFW is not active (manage_ufw=keep).
      NAT rules in /etc/ufw/before.rules only apply when UFW is running.
      The relay is NOT forwarding traffic.
      Fix: ansible-playbook playbooks/relay.yml --tags ufw
    success_msg: "OK: UFW is active (keep mode)"
  when:
    - manage_ufw == "keep"
    - sysctl_conf_stat.stat.exists
    - ufw_status_health.rc is defined
  tags:
    - verify
    - health
    - maintenance

- name: Check iptables rules.v4 persistence file (disable mode)
  ansible.builtin.stat:
    path: /etc/iptables/rules.v4
  register: rules_v4_stat
  when:
    - manage_ufw == "disable"
    - sysctl_conf_stat.stat.exists
  tags:
    - verify
    - health
    - maintenance

- name: Assert rules.v4 exists (disable mode)
  ansible.builtin.assert:
    that:
      - rules_v4_stat.stat.exists
    fail_msg: >-
      CRITICAL: /etc/iptables/rules.v4 does not exist (manage_ufw=disable).
      Rules will NOT be restored on next reboot.
      Fix: ansible-playbook playbooks/relay.yml --tags persist
    success_msg: "OK: /etc/iptables/rules.v4 persistence file exists (disable mode)"
  when:
    - manage_ufw == "disable"
    - sysctl_conf_stat.stat.exists
  tags:
    - verify
    - health
    - maintenance

