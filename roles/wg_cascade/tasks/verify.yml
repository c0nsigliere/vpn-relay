---
# Verification tasks for wg_cascade role
# All tasks are read-only (changed_when: false)
# wg-uplink is gone — only wg-clients (Server A) is verified here.

- name: "[A] Show wg show wg-clients"
  ansible.builtin.command:
    cmd: wg show wg-clients
  register: _wg_show
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups['server_a']

- name: "[A] Display wg show output"
  ansible.builtin.debug:
    msg: "{{ _wg_show.stdout_lines }}"
  when: inventory_hostname in groups['server_a']

- name: "[A] Show ip rule list"
  ansible.builtin.command:
    cmd: ip rule show
  register: _ip_rule
  changed_when: false
  when: inventory_hostname in groups['server_a']

- name: "[A] Display ip rule output"
  ansible.builtin.debug:
    msg: "{{ _ip_rule.stdout_lines }}"
  when: inventory_hostname in groups['server_a']

- name: "[A] Assert ip rule for TPROXY fwmark 0x1 exists (table {{ xray_tproxy_table }})"
  ansible.builtin.assert:
    that:
      - "'fwmark 0x1' in _ip_rule.stdout"
    fail_msg: >-
      TPROXY fwmark rule (fwmark 0x1 → table {{ xray_tproxy_table }}) is missing on Server A.
      Check that wg-quick@wg-clients is active and PostUp ran successfully.
    success_msg: "TPROXY fwmark rule is present"
  when: inventory_hostname in groups['server_a']

- name: "[A] Show ip route table {{ xray_tproxy_table }}"
  ansible.builtin.command:
    cmd: "ip route show table {{ xray_tproxy_table }}"
  register: _route_tproxy
  changed_when: false
  when: inventory_hostname in groups['server_a']

- name: "[A] Display TPROXY route table output"
  ansible.builtin.debug:
    msg: "{{ _route_tproxy.stdout_lines }}"
  when: inventory_hostname in groups['server_a']

- name: "[A] Assert local default route exists in table {{ xray_tproxy_table }}"
  ansible.builtin.assert:
    that:
      - "'local' in _route_tproxy.stdout"
    fail_msg: >-
      Local default route in table {{ xray_tproxy_table }} is missing.
      Check that wg-quick@wg-clients is active and PostUp ran successfully.
    success_msg: "Local default route in table {{ xray_tproxy_table }} is present"
  when: inventory_hostname in groups['server_a']

- name: "[A] Show TPROXY mangle rules"
  ansible.builtin.command:
    cmd: iptables -t mangle -L XRAY_WG_TPROXY -n
  register: _tproxy_rules
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups['server_a']

- name: "[A] Display TPROXY mangle rules"
  ansible.builtin.debug:
    msg: "{{ _tproxy_rules.stdout_lines }}"
  when: inventory_hostname in groups['server_a']

- name: "[A] Check wg-quick@wg-clients service status"
  ansible.builtin.command:
    cmd: systemctl is-active wg-quick@wg-clients
  register: _wg_clients_status
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups['server_a']

- name: "[A] Assert wg-quick@wg-clients is active"
  ansible.builtin.assert:
    that:
      - _wg_clients_status.rc == 0
    fail_msg: "wg-quick@wg-clients is not active on {{ inventory_hostname }} (status: {{ _wg_clients_status.stdout }})"
    success_msg: "wg-quick@wg-clients is active"
  when: inventory_hostname in groups['server_a']

# =============================================================================
# Resource summary — memory and swap (MemAvailable from /proc/meminfo)
# =============================================================================
- name: Import memory parsing tasks (/proc/meminfo)
  ansible.builtin.import_tasks: memory.yml

- name: Display memory summary (/proc/meminfo)
  ansible.builtin.debug:
    msg: >-
      {{ inventory_hostname }} memory:
      MemTotal={{ _mem_total_mb }} MB,
      MemAvailable={{ _mem_available_mb }} MB,
      SwapTotal={{ _swap_total_mb }} MB,
      SwapFree={{ _swap_free_mb }} MB

- name: "WARN: MemAvailable is critically low (< 128 MB)"
  ansible.builtin.debug:
    msg: >-
      WARNING: {{ inventory_hostname }} has only {{ _mem_available_mb }} MB available RAM
      (MemAvailable from /proc/meminfo). WireGuard and system stability may be
      compromised. Consider adding swap:
        ansible-playbook playbooks/maintenance_add_swap.yml
  when: _mem_available_mb | int < 128

- name: "WARN: No swap configured (SwapTotal == 0)"
  ansible.builtin.debug:
    msg: >-
      WARNING: {{ inventory_hostname }} has no swap configured (SwapTotal = 0).
      Small VPS instances may OOM-kill WireGuard or system processes under load.
      Add swap with: ansible-playbook playbooks/maintenance_add_swap.yml
  when: _swap_total_mb | int == 0

- name: Collect memory and swap usage (free -h)
  ansible.builtin.command:
    cmd: free -h
  register: _free_h
  changed_when: false

- name: Display free -h output
  ansible.builtin.debug:
    msg: "{{ _free_h.stdout_lines }}"

- name: Display CPU and load averages
  ansible.builtin.debug:
    msg: >-
      {{ inventory_hostname }}:
      CPUs={{ ansible_processor_vcpus }},
      load avg={{ ansible_loadavg['1m'] | round(2) }} (1m) /
      {{ ansible_loadavg['5m'] | round(2) }} (5m) /
      {{ ansible_loadavg['15m'] | round(2) }} (15m)
