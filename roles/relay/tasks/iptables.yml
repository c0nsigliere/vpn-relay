---
# IPTables rules for disable mode (direct iptables management)
# TCP relay only (XRay/VLESS). UDP/WireGuard is handled by the cascade role.

- name: TCP DNAT - Redirect incoming to Server B
  ansible.builtin.iptables:
    table: nat
    chain: PREROUTING
    in_interface: "{{ wan_if_final }}"
    protocol: tcp
    destination_port: "{{ port_a_tcp }}"
    jump: DNAT
    to_destination: "{{ server_b_public_ip }}:{{ port_b_tcp }}"
    action: insert
    rule_num: 1
    comment: "VPN Relay TCP DNAT"
  notify: save netfilter rules

- name: TCP MASQUERADE - SNAT for outgoing to Server B
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    out_interface: "{{ wan_if_final }}"
    protocol: tcp
    destination: "{{ server_b_public_ip }}"
    destination_port: "{{ port_b_tcp }}"
    jump: MASQUERADE
    comment: "VPN Relay TCP MASQUERADE"
  notify: save netfilter rules

- name: TCP FORWARD to Server B
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ wan_if_final }}"
    protocol: tcp
    destination: "{{ server_b_public_ip }}"
    destination_port: "{{ port_b_tcp }}"
    ctstate: NEW,ESTABLISHED,RELATED
    jump: ACCEPT
    comment: "VPN Relay TCP FORWARD to B"
  notify: save netfilter rules

- name: TCP FORWARD from Server B
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ wan_if_final }}"
    protocol: tcp
    source: "{{ server_b_public_ip }}"
    source_port: "{{ port_b_tcp }}"
    ctstate: ESTABLISHED,RELATED
    jump: ACCEPT
    comment: "VPN Relay TCP FORWARD from B"
  notify: save netfilter rules
