---
- name: Install acl and rsync packages
  apt:
    name:
      - acl
      - rsync
    state: present
    update_cache: false
  tags: [install, bot]

- name: Check installed Node.js major version
  shell: node --version 2>/dev/null | sed 's/^v\([0-9]*\).*/\1/'
  register: _node_installed_major
  changed_when: false
  failed_when: false
  tags: [install, bot]

- name: Install Node.js {{ node_major_version }} (NodeSource)
  block:
    - name: Download NodeSource setup script
      get_url:
        url: "https://deb.nodesource.com/setup_{{ node_major_version }}.x"
        dest: /tmp/nodesource_setup.sh
        mode: "0755"

    - name: Run NodeSource setup script
      command: bash /tmp/nodesource_setup.sh
      changed_when: true

    - name: Install nodejs
      apt:
        name: nodejs
        state: present
        update_cache: true
  when: _node_installed_major.stdout != node_major_version | string
  tags: [install, bot]

- name: Install pnpm globally via npm
  npm:
    name: pnpm
    global: true
    state: present
  tags: [install, bot]

- name: Create vpn-bot system group
  group:
    name: "{{ bot_group }}"
    system: true
    state: present
  tags: [install, bot]

- name: Create vpn-bot system user
  user:
    name: "{{ bot_user }}"
    group: "{{ bot_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ bot_data_dir }}"
    create_home: true
    state: present
  tags: [install, bot]

- name: Create bot data, SSH, and Ansible temp directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ bot_user }}"
    group: "{{ bot_group }}"
    mode: "0700"
  loop:
    - "{{ bot_data_dir }}"
    - "{{ bot_data_dir }}/.ssh"
    - "{{ bot_data_dir }}/.ansible/tmp"
  tags: [install, bot]

- name: Generate SSH keypair for bot → Server A access
  community.crypto.openssh_keypair:
    path: "{{ bot_ssh_key_path }}"
    type: ed25519
    owner: "{{ bot_user }}"
    group: "{{ bot_group }}"
    mode: "0600"
    regenerate: never
  register: _bot_ssh_key
  tags: [install, bot]

- name: Authorize bot SSH key on entry node (cascade mode only)
  authorized_key:
    user: "{{ hostvars[groups['relay_servers'][0]]['ansible_user'] | default('root') }}"
    key: "{{ _bot_ssh_key.public_key }}"
    state: present
    comment: "vpn-bot@{{ inventory_hostname }}"
  delegate_to: "{{ groups['relay_servers'][0] }}"
  when: groups.get('relay_servers', []) | length > 0
  tags: [install, bot]
