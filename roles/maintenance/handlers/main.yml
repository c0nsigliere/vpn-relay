---
# Handlers for the maintenance role.

- name: Restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart systemd-journald
  ansible.builtin.service:
    name: systemd-journald
    state: restarted
