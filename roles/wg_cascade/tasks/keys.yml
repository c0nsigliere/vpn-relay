---
# Key generation for wg_cascade role (Server A only)
#
# Only wg-clients keypair is needed on Server A.
# wg-uplink has been replaced by XRay TPROXY — no cross-host key exchange required.

# =============================================================================
# SERVER A: Generate wg-clients keypair
# =============================================================================

- name: "[A] Check if wg-clients private key exists"
  ansible.builtin.stat:
    path: "{{ wg_keys_dir }}/wg-clients.key"
  register: _wg_clients_key_stat
  when: inventory_hostname in groups['server_a']

- name: "[A] Generate wg-clients private key"
  ansible.builtin.shell:
    cmd: "wg genkey > {{ wg_keys_dir }}/wg-clients.key"
  when:
    - inventory_hostname in groups['server_a']
    - not _wg_clients_key_stat.stat.exists

- name: "[A] Set permissions on wg-clients private key"
  ansible.builtin.file:
    path: "{{ wg_keys_dir }}/wg-clients.key"
    mode: '0600'
    owner: root
    group: root
  when: inventory_hostname in groups['server_a']

- name: "[A] Derive wg-clients public key"
  ansible.builtin.shell:
    cmd: "wg pubkey < {{ wg_keys_dir }}/wg-clients.key > {{ wg_keys_dir }}/wg-clients.pub"
  args:
    creates: "{{ wg_keys_dir }}/wg-clients.pub"
  when: inventory_hostname in groups['server_a']

- name: "[A] Set permissions on wg-clients public key"
  ansible.builtin.file:
    path: "{{ wg_keys_dir }}/wg-clients.pub"
    mode: '0644'
    owner: root
    group: root
  when: inventory_hostname in groups['server_a']
