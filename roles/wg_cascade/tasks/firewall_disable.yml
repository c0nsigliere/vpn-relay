---
# Firewall configuration — iptables-persistent mode (UFW disabled)
# Server A only: MSS clamping + TPROXY mangle rules.
# Server B no longer runs wg_cascade role.

# =============================================================================
# Common setup (Server A): disable UFW, enable netfilter-persistent
# =============================================================================

- name: Stop and disable UFW
  ansible.builtin.systemd:
    name: ufw
    state: stopped
    enabled: false
  failed_when: false

- name: Ensure netfilter-persistent is enabled and started
  ansible.builtin.systemd:
    name: netfilter-persistent
    enabled: true
    state: started
  failed_when: false

- name: "Clamp TCP MSS to PMTU on FORWARD chain (mangle table)"
  ansible.builtin.iptables:
    table: mangle
    chain: FORWARD
    protocol: tcp
    tcp_flags:
      flags:
        - SYN
        - RST
      flags_set:
        - SYN
    jump: TCPMSS
    clamp_mss_to_pmtu: true
    comment: "WG cascade: clamp MSS to PMTU"
  notify: save netfilter rules

# =============================================================================
# SERVER A: TPROXY mangle — intercept wg-clients traffic for XRay
# =============================================================================

- name: "[A] Create XRAY_WG_TPROXY chain in mangle table"
  ansible.builtin.iptables:
    table: mangle
    chain: XRAY_WG_TPROXY
    chain_management: true
  when: inventory_hostname in groups['server_a']
  notify: save netfilter rules

- name: "[A] TPROXY: exempt private 10.0.0.0/8"
  ansible.builtin.iptables:
    table: mangle
    chain: XRAY_WG_TPROXY
    destination: 10.0.0.0/8
    jump: RETURN
  when: inventory_hostname in groups['server_a']
  notify: save netfilter rules

- name: "[A] TPROXY: exempt loopback 127.0.0.0/8"
  ansible.builtin.iptables:
    table: mangle
    chain: XRAY_WG_TPROXY
    destination: 127.0.0.0/8
    jump: RETURN
  when: inventory_hostname in groups['server_a']
  notify: save netfilter rules

- name: "[A] TPROXY: exempt link-local 169.254.0.0/16"
  ansible.builtin.iptables:
    table: mangle
    chain: XRAY_WG_TPROXY
    destination: 169.254.0.0/16
    jump: RETURN
  when: inventory_hostname in groups['server_a']
  notify: save netfilter rules

- name: "[A] TPROXY: exempt private 172.16.0.0/12"
  ansible.builtin.iptables:
    table: mangle
    chain: XRAY_WG_TPROXY
    destination: 172.16.0.0/12
    jump: RETURN
  when: inventory_hostname in groups['server_a']
  notify: save netfilter rules

- name: "[A] TPROXY: exempt private 192.168.0.0/16"
  ansible.builtin.iptables:
    table: mangle
    chain: XRAY_WG_TPROXY
    destination: 192.168.0.0/16
    jump: RETURN
  when: inventory_hostname in groups['server_a']
  notify: save netfilter rules

- name: "[A] TPROXY: exempt multicast 224.0.0.0/4"
  ansible.builtin.iptables:
    table: mangle
    chain: XRAY_WG_TPROXY
    destination: 224.0.0.0/4
    jump: RETURN
  when: inventory_hostname in groups['server_a']
  notify: save netfilter rules

- name: "[A] TPROXY: exempt reserved 240.0.0.0/4"
  ansible.builtin.iptables:
    table: mangle
    chain: XRAY_WG_TPROXY
    destination: 240.0.0.0/4
    jump: RETURN
  when: inventory_hostname in groups['server_a']
  notify: save netfilter rules

- name: "[A] TPROXY: redirect TCP from wg-clients to XRay"
  ansible.builtin.iptables:
    table: mangle
    chain: XRAY_WG_TPROXY
    protocol: tcp
    jump: TPROXY
    target_extensions:
      - "--on-port {{ xray_tproxy_port }} --tproxy-mark 0x1/0x1"
    comment: "TPROXY TCP to XRay"
  when: inventory_hostname in groups['server_a']
  notify: save netfilter rules

- name: "[A] TPROXY: redirect UDP from wg-clients to XRay"
  ansible.builtin.iptables:
    table: mangle
    chain: XRAY_WG_TPROXY
    protocol: udp
    jump: TPROXY
    target_extensions:
      - "--on-port {{ xray_tproxy_port }} --tproxy-mark 0x1/0x1"
    comment: "TPROXY UDP to XRay"
  when: inventory_hostname in groups['server_a']
  notify: save netfilter rules

- name: "[A] TPROXY: jump from PREROUTING -i wg-clients to XRAY_WG_TPROXY"
  ansible.builtin.iptables:
    table: mangle
    chain: PREROUTING
    in_interface: wg-clients
    jump: XRAY_WG_TPROXY
    comment: "WG cascade A: TPROXY wg-clients via XRay"
  when: inventory_hostname in groups['server_a']
  notify: save netfilter rules
