---
# Add an XRay VLESS+Reality user to Server B
#
# Usage:
#   # Generate UUID automatically:
#   ansible-playbook playbooks/add_xray_user.yml -e "user_name=alice"
#
#   # Provide UUID explicitly:
#   ansible-playbook playbooks/add_xray_user.yml \
#     -e "user_name=alice" -e "user_uuid=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
#
# Required extra vars:
#   user_name  - Unique identifier for the user (no spaces)
#
# Optional extra vars:
#   user_uuid  - UUID for the user (auto-generated if omitted)
#
# Output:
#   artifacts/xray/<user_name>.vless.txt  — VLESS share URI (mobile app import)
#   artifacts/xray/<user_name>.json       — XRay client JSON config
#   artifacts/xray/<user_name>.vless.qr.png — QR code (if qrencode available)
#
# Security note:
#   - Reality private key never leaves Server B
#   - Client artifacts contain ONLY public values (pubkey, shortId, UUID)
#   - artifacts/xray/ is gitignored

- name: Add XRay VLESS+Reality user
  hosts: xray_servers
  become: true

  vars:
    user_name: ""
    user_uuid: ""

  pre_tasks:
    - name: Assert user_name is provided
      ansible.builtin.assert:
        that:
          - user_name | length > 0
        fail_msg: "user_name is required. Use: -e 'user_name=alice'"

    - name: Ensure artifacts/xray directory exists on controller
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../artifacts/xray"
        state: directory
        mode: '0700'
      delegate_to: localhost
      become: false

  tasks:
    # =========================================================================
    # Generate or validate UUID
    # =========================================================================

    - name: Generate UUID via xray if not provided
      ansible.builtin.command:
        cmd: "{{ xray_bin }} uuid"
      register: _xray_uuid_output
      changed_when: false
      when: user_uuid | length == 0

    - name: Set user UUID fact
      ansible.builtin.set_fact:
        _user_uuid: "{{ user_uuid if user_uuid | length > 0 else _xray_uuid_output.stdout | trim }}"

    - name: Display new user info
      ansible.builtin.debug:
        msg: "Adding user '{{ user_name }}' with UUID {{ _user_uuid }}"

    # =========================================================================
    # Read and update users.json (duplicate prevention, sorted by name)
    # =========================================================================

    - name: Read current users.json
      ansible.builtin.slurp:
        src: "{{ xray_users_file }}"
      register: _xray_users_slurp

    - name: Parse current users list
      ansible.builtin.set_fact:
        _xray_current_users: "{{ _xray_users_slurp.content | b64decode | from_json }}"

    - name: Check for duplicate name
      ansible.builtin.assert:
        that:
          - _xray_current_users | selectattr('name', 'equalto', user_name) | list | length == 0
        fail_msg: "User '{{ user_name }}' already exists in users.json"

    - name: Check for duplicate UUID
      ansible.builtin.assert:
        that:
          - _xray_current_users | selectattr('uuid', 'equalto', _user_uuid) | list | length == 0
        fail_msg: "UUID '{{ _user_uuid }}' already exists in users.json"

    - name: Build updated users list (sorted by name)
      ansible.builtin.set_fact:
        _xray_updated_users: "{{ (_xray_current_users + [{'name': user_name, 'uuid': _user_uuid}]) | sort(attribute='name') }}"

    - name: Write updated users.json
      ansible.builtin.copy:
        content: "{{ _xray_updated_users | to_nice_json }}"
        dest: "{{ xray_users_file }}"
        mode: '0600'
        owner: root
        group: root

    # =========================================================================
    # Reload keys and re-template config
    # =========================================================================

    - name: Import key facts from xray_server role
      ansible.builtin.import_role:
        name: xray_server
        tasks_from: keys

    - name: Re-parse users for config template
      ansible.builtin.set_fact:
        _xray_users: "{{ _xray_updated_users }}"

    - name: Re-template XRay config.json
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/xray_server/templates/config.json.j2"
        dest: "{{ xray_config_dir }}/config.json"
        mode: '0600'
        owner: root
        group: root
      no_log: true

    - name: Restart xray to pick up new user
      ansible.builtin.systemd:
        name: xray
        state: restarted

    # =========================================================================
    # Generate client artifacts on controller
    # =========================================================================

    - name: Set client endpoint variables
      ansible.builtin.set_fact:
        _client_address: "{{ hostvars[groups['server_a'][0]]['ansible_host'] }}"
        _client_port: "{{ port_a_tcp | default(8443) }}"
        _user_name: "{{ user_name }}"

    - name: Generate VLESS share URI
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/xray_server/templates/xray-user.vless.txt.j2"
        dest: "{{ playbook_dir }}/../artifacts/xray/{{ user_name }}.vless.txt"
        mode: '0600'
      delegate_to: localhost
      become: false

    - name: Generate XRay client JSON config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/xray_server/templates/xray-user.json.j2"
        dest: "{{ playbook_dir }}/../artifacts/xray/{{ user_name }}.json"
        mode: '0600'
      delegate_to: localhost
      become: false

    - name: Read generated VLESS URI for QR and display
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/../artifacts/xray/{{ user_name }}.vless.txt"
      register: _vless_uri_slurp
      delegate_to: localhost
      become: false

    - name: Set VLESS URI fact
      ansible.builtin.set_fact:
        _vless_uri: "{{ _vless_uri_slurp.content | b64decode | trim }}"

    # =========================================================================
    # Optional QR code generation (non-fatal if qrencode missing)
    # =========================================================================

    - name: Check if qrencode is available on controller
      ansible.builtin.command:
        cmd: which qrencode
      register: _qrencode_check
      changed_when: false
      failed_when: false
      delegate_to: localhost
      become: false

    - name: Generate QR code PNG
      ansible.builtin.command:
        cmd: "qrencode -o {{ playbook_dir }}/../artifacts/xray/{{ user_name }}.vless.qr.png '{{ _vless_uri }}'"
      delegate_to: localhost
      become: false
      when: _qrencode_check.rc == 0
      changed_when: true

    - name: Warn if qrencode not available
      ansible.builtin.debug:
        msg: "qrencode not found on controller — skipping QR code generation. Install with: apt install qrencode"
      when: _qrencode_check.rc != 0

    # =========================================================================
    # Summary
    # =========================================================================

    - name: Display user creation summary
      ansible.builtin.debug:
        msg: |
          XRay user '{{ user_name }}' added successfully.

          VLESS URI (safe to share — contains only public values):
            {{ _vless_uri }}

          Client artifacts:
            artifacts/xray/{{ user_name }}.vless.txt   — VLESS share link
            artifacts/xray/{{ user_name }}.json         — XRay client config
            {{ 'artifacts/xray/' + user_name + '.vless.qr.png — QR code' if _qrencode_check.rc == 0 else '(QR code skipped — install qrencode)' }}

          Endpoint: {{ _client_address }}:{{ _client_port }}
