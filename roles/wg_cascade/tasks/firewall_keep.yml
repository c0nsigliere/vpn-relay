---
# Firewall configuration — UFW keep mode
# Server A only: wg-clients port + TPROXY mangle rules.
# Server B no longer runs wg_cascade role.

# =============================================================================
# Common setup (Server A)
# =============================================================================

- name: Ensure UFW is installed
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

- name: Allow SSH through UFW (safety — must come before enabling)
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    comment: "SSH access"

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Set default forward policy to ACCEPT in /etc/default/ufw
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: '^DEFAULT_FORWARD_POLICY='
    line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'
    state: present
  notify: reload ufw

# =============================================================================
# SERVER A: Allow client-facing WireGuard port
# =============================================================================

- name: "[A] Allow wg-clients UDP port through UFW"
  community.general.ufw:
    rule: allow
    port: "{{ wg_clients_port }}"
    proto: udp
    comment: "WG cascade — client entry port (wg-clients)"
  when: inventory_hostname in groups['server_a']

# =============================================================================
# SERVER A: Mangle rules — MSS clamping + TPROXY for wg-clients traffic
#
# XRAY_WG_TPROXY chain intercepts all traffic from wg-clients interface and
# redirects it to XRay TPROXY inbound on xray_tproxy_port.
# Private/loopback/multicast destinations are exempted (returned to normal routing).
# =============================================================================

- name: "[A] Inject INPUT accept rule for TPROXY-marked packets into /etc/ufw/before.rules"
  ansible.builtin.blockinfile:
    path: /etc/ufw/before.rules
    insertafter: '^-A ufw-before-input -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT'
    marker: "# {mark} WG-CASCADE TPROXY INPUT RULES"
    block: |
      # Accept TPROXY-redirected WG client traffic (fwmark 0x1) before ufw-not-local drops it
      # TPROXY packets have external dst IPs, ufw-not-local would otherwise DROP them
      -A ufw-before-input -m mark --mark 0x1/0x1 -j ACCEPT
    state: present
  when: inventory_hostname in groups['server_a']
  notify: reload ufw

- name: "[A] Inject mangle TPROXY rules into /etc/ufw/before.rules"
  ansible.builtin.blockinfile:
    path: /etc/ufw/before.rules
    insertbefore: '^\*filter'
    marker: "# {mark} WG-CASCADE MANGLE RULES"
    block: |
      *mangle
      :FORWARD ACCEPT [0:0]
      :PREROUTING ACCEPT [0:0]
      :XRAY_WG_TPROXY - [0:0]
      -A FORWARD -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu
      -A XRAY_WG_TPROXY -d 10.0.0.0/8 -j RETURN
      -A XRAY_WG_TPROXY -d 127.0.0.0/8 -j RETURN
      -A XRAY_WG_TPROXY -d 169.254.0.0/16 -j RETURN
      -A XRAY_WG_TPROXY -d 172.16.0.0/12 -j RETURN
      -A XRAY_WG_TPROXY -d 192.168.0.0/16 -j RETURN
      -A XRAY_WG_TPROXY -d 224.0.0.0/4 -j RETURN
      -A XRAY_WG_TPROXY -d 240.0.0.0/4 -j RETURN
      -A XRAY_WG_TPROXY -p tcp -j TPROXY --on-port {{ xray_tproxy_port }} --tproxy-mark 0x1/0x1
      -A XRAY_WG_TPROXY -p udp -j TPROXY --on-port {{ xray_tproxy_port }} --tproxy-mark 0x1/0x1
      -A PREROUTING -i wg-clients -j XRAY_WG_TPROXY
      COMMIT
    state: present
  when: inventory_hostname in groups['server_a']
  notify: reload ufw
