---
# IPTables rules for disable mode (direct iptables management)

# =============================================================================
# UDP RELAY RULES (AWG/WireGuard)
# =============================================================================

- name: UDP DNAT - Redirect incoming to Server B
  ansible.builtin.iptables:
    table: nat
    chain: PREROUTING
    in_interface: "{{ wan_if_final }}"
    protocol: udp
    destination_port: "{{ port_a_udp }}"
    jump: DNAT
    to_destination: "{{ ip_b }}:{{ port_b_udp }}"
    action: insert
    rule_num: 1
    comment: "VPN Relay UDP DNAT"
  notify: save netfilter rules

- name: UDP MASQUERADE - SNAT for outgoing to Server B
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    out_interface: "{{ wan_if_final }}"
    protocol: udp
    destination: "{{ ip_b }}"
    destination_port: "{{ port_b_udp }}"
    jump: MASQUERADE
    comment: "VPN Relay UDP MASQUERADE"
  notify: save netfilter rules

- name: UDP FORWARD to Server B
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ wan_if_final }}"
    protocol: udp
    destination: "{{ ip_b }}"
    destination_port: "{{ port_b_udp }}"
    ctstate: NEW,ESTABLISHED,RELATED
    jump: ACCEPT
    comment: "VPN Relay UDP FORWARD to B"
  notify: save netfilter rules

- name: UDP FORWARD from Server B
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ wan_if_final }}"
    protocol: udp
    source: "{{ ip_b }}"
    source_port: "{{ port_b_udp }}"
    ctstate: ESTABLISHED,RELATED
    jump: ACCEPT
    comment: "VPN Relay UDP FORWARD from B"
  notify: save netfilter rules

# =============================================================================
# TCP RELAY RULES (XRay)
# =============================================================================

- name: TCP DNAT - Redirect incoming to Server B
  ansible.builtin.iptables:
    table: nat
    chain: PREROUTING
    in_interface: "{{ wan_if_final }}"
    protocol: tcp
    destination_port: "{{ port_a_tcp }}"
    jump: DNAT
    to_destination: "{{ ip_b }}:{{ port_b_tcp }}"
    action: insert
    rule_num: 1
    comment: "VPN Relay TCP DNAT"
  notify: save netfilter rules

- name: TCP MASQUERADE - SNAT for outgoing to Server B
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    out_interface: "{{ wan_if_final }}"
    protocol: tcp
    destination: "{{ ip_b }}"
    destination_port: "{{ port_b_tcp }}"
    jump: MASQUERADE
    comment: "VPN Relay TCP MASQUERADE"
  notify: save netfilter rules

- name: TCP FORWARD to Server B
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ wan_if_final }}"
    protocol: tcp
    destination: "{{ ip_b }}"
    destination_port: "{{ port_b_tcp }}"
    ctstate: NEW,ESTABLISHED,RELATED
    jump: ACCEPT
    comment: "VPN Relay TCP FORWARD to B"
  notify: save netfilter rules

- name: TCP FORWARD from Server B
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ wan_if_final }}"
    protocol: tcp
    source: "{{ ip_b }}"
    source_port: "{{ port_b_tcp }}"
    ctstate: ESTABLISHED,RELATED
    jump: ACCEPT
    comment: "VPN Relay TCP FORWARD from B"
  notify: save netfilter rules
