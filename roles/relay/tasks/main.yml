---
# Main task orchestrator for relay role

- name: Import validation tasks
  ansible.builtin.import_tasks: validate.yml
  tags:
    - validate

- name: Import sysctl tasks
  ansible.builtin.import_tasks: sysctl.yml
  tags:
    - sysctl

- name: Import UFW keep mode tasks
  ansible.builtin.import_tasks: ufw_keep.yml
  when: manage_ufw == "keep"
  tags:
    - ufw

- name: Import UFW disable mode tasks
  ansible.builtin.import_tasks: ufw_disable.yml
  when: manage_ufw == "disable"
  tags:
    - ufw

- name: Import iptables tasks (disable mode only)
  ansible.builtin.import_tasks: iptables.yml
  when: manage_ufw == "disable"
  tags:
    - iptables

- name: Import XRay uplink client tasks
  ansible.builtin.import_tasks: xray_uplink.yml
  tags:
    - xray

- name: Import persistence tasks
  ansible.builtin.import_tasks: persist.yml
  tags:
    - persist

- name: Flush handlers before verification
  ansible.builtin.meta: flush_handlers
  tags:
    - verify

- name: Import verification tasks
  ansible.builtin.import_tasks: verify.yml
  tags:
    - verify
