---
# Sysctl configuration for IP forwarding and routing

- name: Enable IPv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_file: /etc/sysctl.d/99-vpn-relay.conf
    reload: true
    state: present

# rp_filter is intentionally NOT set here.
# On Server A, wg_cascade owns rp_filter (must be 0 for TPROXY).
# relay/sysctl.yml setting rp_filter=2 would override the wg_cascade value
# because 99-vpn-relay.conf loads after 99-wg-cascade.conf alphabetically.
