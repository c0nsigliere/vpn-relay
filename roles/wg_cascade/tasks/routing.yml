# TPROXY routing for Server A
#
# wg-uplink and its policy routing table (table 200) are gone.
# TPROXY routing (ip rule fwmark + ip route local) is managed via
# wg-clients PostUp/PreDown hooks in wg-clients.conf.j2.
#
# This file is intentionally minimal — the hooks in the WG config handle
# the runtime routing state; nothing needs to be applied idempotently here
# since wg-quick restarts will re-apply them automatically.
