---
# XRay VLESS+Reality server role defaults

# XRay binary version — must match a GitHub release tag (e.g. "24.11.30")
xray_version: "24.11.30"

# Listening port for VLESS+Reality inbound
xray_port: 443

# Reality camouflage destination and SNI
xray_reality_dest: "www.microsoft.com:443"
xray_reality_server_names:
  - "www.microsoft.com"
xray_reality_fingerprint: "chrome"

# VLESS flow — enables XTLS Vision TLS-in-TLS splice protection.
# Set to "" to disable (required for clients that don't support this flow).
xray_vless_flow: "xtls-rprx-vision"

# Paths
xray_config_dir: "/etc/xray"
xray_keys_dir: "/etc/xray/keys"
xray_clients_file: "/etc/xray/clients.json"
xray_bin: "/usr/local/bin/xray"

# Firewall management mode (shared with other roles)
# - "keep": Keep UFW enabled, add allow rule via ufw module
# - "disable": UFW disabled, use iptables INPUT rule
manage_ufw: "keep"

# WAN interface — leave empty for auto-detection
wan_if: ""

# Rollback: also remove key material
xray_remove_keys: false
