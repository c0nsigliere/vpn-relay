---
# Standalone verification playbook for WireGuard cascade (Server A)
#
# Usage:
#   ansible-playbook playbooks/verify_wg_cascade.yml
#
# Checks:
#   - wg show wg-clients (Server A)
#   - ip rule fwmark 0x1 for TPROXY (Server A)
#   - ip route table 100 local default dev lo (Server A)
#   - iptables mangle XRAY_WG_TPROXY chain (Server A)
#   - wg-quick@wg-clients service status (Server A)

- name: Verify WireGuard cascade status
  hosts: wg_cascade
  become: true

  tasks:
    - name: Run wg_cascade verification tasks
      ansible.builtin.import_role:
        name: wg_cascade
        tasks_from: verify
