---
# Package update: apt update + apt-get dist-upgrade
# Installs all upgrades including those requiring new dependencies.
# Tags: update, maintenance

- name: Update apt package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 0
  tags:
    - update
    - maintenance

- name: Run dist upgrade (apt-get dist-upgrade)
  ansible.builtin.apt:
    upgrade: dist
    autoremove: false
    autoclean: false
  register: apt_safe_upgrade_result
  tags:
    - update
    - maintenance

- name: Display upgrade summary
  ansible.builtin.debug:
    msg: >-
      Dist upgrade complete.
      Changed: {{ apt_safe_upgrade_result.changed }}.
      {% if apt_safe_upgrade_result.changed %}
      Packages were upgraded. Check stdout for details.
      {% else %}
      All packages already up to date.
      {% endif %}
  changed_when: false
  tags:
    - update
    - maintenance

- name: Clean apt package cache
  ansible.builtin.apt:
    clean: true
  tags:
    - update
    - maintenance
