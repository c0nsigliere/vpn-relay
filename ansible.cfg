[defaults]
# No default inventory — always specify with -i:
#   ansible-playbook playbooks/stack.yml -i inventory/my-deployment/
# inventory = inventory/my-deployment/
roles_path = roles
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPath=/tmp/ansible-ssh-%h-%p-%r -o ControlPersist=60s -o ServerAliveInterval=15 -o ServerAliveCountMax=3
