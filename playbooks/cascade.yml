---
# Deploy WireGuard cascade VPN (A → B)
#
# Usage:
#   ansible-playbook playbooks/cascade.yml
#   ansible-playbook playbooks/cascade.yml --tags validate   # validation only
#   ansible-playbook playbooks/cascade.yml --tags keys       # key generation only
#   ansible-playbook playbooks/cascade.yml --tags verify     # verification only
#
# Requirements:
#   - server_b_public_ip must be set in inventory/group_vars/all.yml
#   - Both server_a and server_b must be reachable
#   - Run: ansible-galaxy collection install -r requirements.yml

- name: Deploy WireGuard cascade VPN
  hosts: wg_cascade
  become: true

  roles:
    - wg_cascade
