---
# Main playbook to configure VPN relay servers (TCP only — XRay/VLESS)
# UDP/WireGuard is handled by the cascade role (playbooks/cascade.yml).
#
# Usage:
#   ansible-playbook playbooks/relay.yml
#
# With specific options:
#   ansible-playbook playbooks/relay.yml \
#     -e "port_a_tcp=443" \
#     -e "manage_ufw=keep"
#
# Run specific tags:
#   ansible-playbook playbooks/relay.yml --tags verify

- name: Configure VPN Relay Servers
  hosts: relay_servers
  become: true
  roles:
    - relay
